<html>

<head>
    <title>ESP32ermostat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:,">
    <style>
        html {
            font-family: Helvetica;
            display: inline-block;
            margin: 0px auto;
            text-align: center;
        }

        h1 {
            color: #0F3376;
            padding: 2vh;
        }

        p {
            font-size: 1.5rem;
        }
        .btn-link-on {
            display: inline-block;
            padding: 10px 20px;
            background-color: green;
            color: white;
            text-decoration: none;
            border-radius: 5px;
             font-size: 30px;
            }
            .btn-link-on:hover {
            background-color: darkgreen;
        }
        .btn-link-off {
            display: inline-block;
            padding: 10px 20px;
            background-color: rgb(209, 3, 3);
            color: white;
            text-decoration: none;
            border-radius: 5px;
             font-size: 30px;
            }
            .btn-link-off:hover {
            background-color: rgb(61, 1, 1);
        }
        input[type=submit] {
            display: inline-block;
            background-color: #e7bd3b;
            border: none;
            border-radius: 4px;
            color: white;
            padding: 16px 40px;
            text-decoration: none;
            font-size: 30px;
            margin: 2px;
            cursor: pointer;
        }
        .button {
            display: inline-block;
            background-color: #e7bd3b;
            border: none;
            border-radius: 4px;
            color: white;
            padding: 16px 40px;
            text-decoration: none;
            font-size: 30px;
            margin: 2px;
            cursor: pointer;
        }

        .button2 {
            background-color: #4286f4;
        }
    
    </style>
</head>

<body>
    <h1>Thermostat</h1>
    <p><strong>Status: </strong>{boilerStatus}</p>
    <form action="/">
        <label>Desired Home Temperature:</label><br>
        <input type="text" id="target" name="target"><br>
        <input type="submit" value="Submit">
      </form>
    <p><strong>Current Room Temp: </strong> {roomTemp}</p>
    <p><strong>Target Room Temp: </strong> {targetTemp}</p>
    <hr>
    <p><a href="/?override=1" class="btn-link-on">Turn Heating On</a></p>
    <p><a href="/?override=2" class="btn-link-off">Turn Heating Off</a></p>

</body>

</html>
